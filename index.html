<!DOCTYPE html>
<html>
<head>
  <title>CrisisRadar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>🌍 CrisisRadar</h2>

    <p id="lastUpdate">Last update: --</p>

    <div class="stats">
      <p>🔥 Fires: <span id="fires">0</span></p>
      <p>🌪 Storms: <span id="storms">0</span></p>
      <p>🌋 Volcanoes: <span id="volcanoes">0</span></p>
      <p>🧊 Icebergs: <span id="icebergs">0</span></p>
      <p>📊 Total: <span id="total">0</span></p>
    </div>

    <input type="text" id="search" placeholder="Search location..." />

    <div class="filters">
      <button onclick="setActive(this); loadAndFilter('Wildfires')">🔥 Fires</button>
      <button onclick="setActive(this); loadAndFilter('Severe Storms')">🌪 Storms</button>
      <button onclick="setActive(this); loadAndFilter('Volcanoes')">🌋 Volcanoes</button>
      <button onclick="setActive(this); loadAndFilter('Icebergs')">🧊 Icebergs</button>
      <button onclick="resetFilters()">❌ Clear</button>
    </div>

    <button onclick="loadEvents()">📡 Load Events</button>
  </div>

  <!-- LOADER -->
  <div id="loader">Loading data...</div>

  <!-- MAP -->
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>

</body>
</html>
